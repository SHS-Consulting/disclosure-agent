<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0d3a"/>
      <stop offset="100%" stop-color="#03020a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#b39ddb" stroke-width="1.5"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="20" fill="url(#glow)"/>
  <!-- Outer ring segments -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#b39ddb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <!-- Central eye / UAP symbol -->
  <!-- Horizontal ellipse (UAP shape) -->
  <ellipse cx="32" cy="32" rx="12" ry="5" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#00e5ff" opacity="0.9"/>
  <!-- Top beam -->
  <line x1="32" y1="14" x2="32" y2="24" stroke="#b39ddb" stroke-width="1" opacity="0.7"/>
  <!-- Bottom beam -->
  <line x1="32" y1="40" x2="32" y2="50" stroke="#b39ddb" stroke-width="1" opacity="0.7"/>
  <!-- Left beam -->
  <line x1="14" y1="32" x2="20" y2="32" stroke="#b39ddb" stroke-width="1" opacity="0.7"/>
  <!-- Right beam -->
  <line x1="44" y1="32" x2="50" y2="32" stroke="#b39ddb" stroke-width="1" opacity="0.7"/>
  <!-- Corner dots -->
  <circle cx="32" cy="14" r="1.5" fill="#b39ddb" opacity="0.8"/>
  <circle cx="32" cy="50" r="1.5" fill="#b39ddb" opacity="0.8"/>
  <circle cx="14" cy="32" r="1.5" fill="#b39ddb" opacity="0.8"/>
  <circle cx="50" cy="32" r="1.5" fill="#b39ddb" opacity="0.8"/>
</svg>
