name: Deploy to Manus
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy notification
        run: |
          echo "✓ New commit pushed to main"
          echo "✓ Manus will auto-sync via GitHub integration"
          git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "(first commit)"
